name: Publish Main Package to npm
on:
  release:
    types: [published]
  workflow_dispatch:
jobs:
  publish:
    name: Publish umt packages
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'main-')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ./package/main
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Setup Nix
        uses: DeterminateSystems/determinate-nix-action@92ffb5400c3776307a27a1727d7e2ac3dcd9f844 # v3.18.1
      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - name: Setup Node.js for npm publish
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies with frozen lockfile
        run: nix develop -c bun install --frozen-lockfile
      - name: Build project
        run: nix develop -c bun run build:clean:full
      - name: Lint
        run: nix develop -c bun run lint:ci
      - name: Test
        run: nix develop -c bun run test
      - name: Remove unnecessary build artifacts for accurate size measurement
        run: rm -rf module/tsconfig.tsbuildinfo module/tests
      - name: Publish umt to npm
        run: npm publish --provenance
      - name: Publish umt-common to npm
        run: npm publish --provenance
        working-directory: ./package/main/common-module
