name: Main Package CI (Bun)

on:
  pull_request:
    branches:
      - main
      - feature/*
    paths:
      - 'package/main/**'
      - '.github/workflows/main-package-bun.yml'
  push:
    branches:
      - main
      - feature/*
    paths:
      - 'package/main/**'
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  setup:
    name: Setup Dependencies
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        bun-version: [latest]
        os: [ubuntu-latest]
    defaults:
      run:
        working-directory: ./package/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ matrix.bun-version }}
      - name: Restore Dependencies Cache
        id: cache-restore-dev-depends
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: '**/node_modules'
          key: dev-depends-${{ matrix.os }}-bun${{ matrix.bun-version }}-${{ hashFiles('package/main/package.json') }}
      - name: Install Dependencies
        if: steps.cache-restore-dev-depends.outputs.cache-hit != 'true'
        run: bun i
      - name: Save Dependencies Cache
        if: steps.cache-restore-dev-depends.outputs.cache-hit != 'true'
        id: cache-save-dev-depends
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: '**/node_modules'
          key: dev-depends-${{ matrix.os }}-bun${{ matrix.bun-version }}-${{ hashFiles('package/main/package.json') }}

  lint:
    name: Run Lint
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        bun-version: [latest]
        os: [ubuntu-latest]
    defaults:
      run:
        working-directory: ./package/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ matrix.bun-version }}
      - name: Restore Dependencies Cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: '**/node_modules'
          key: dev-depends-${{ matrix.os }}-bun${{ matrix.bun-version }}-${{ hashFiles('package/main/package.json') }}
      - name: Run Lint
        run: bun run lint:ci

  build:
    name: Build Package
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        bun-version: [latest]
        os: [ubuntu-latest]
    defaults:
      run:
        working-directory: ./package/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ matrix.bun-version }}
      - name: Restore Dependencies Cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: '**/node_modules'
          key: dev-depends-${{ matrix.os }}-bun${{ matrix.bun-version }}-${{ hashFiles('package/main/package.json') }}
      - name: Restore Build Cache
        id: cache-restore-prod
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          enableCrossOsArchive: true
          path: '**/module'
          key: ${{ matrix.bun-version }}-${{ hashFiles('package/main/module/tsconfig.tsbuildinfo') }}
      - name: Build Package
        if: steps.cache-restore-prod.outputs.cache-hit != 'true'
        run: bun run build
      - name: Remove unnecessary build artifacts for accurate size measurement
        run: rm -rf module/tsconfig.tsbuildinfo module/tests
      - name: List Module Directory
        run: ls module
      - name: Upload Bundle Analysis to Codecov
        run: bunx @codecov/bundle-analyzer ./module --bundle-name=umt --upload-token=${{ secrets.CODECOV_TOKEN }}
      - name: Save Build Cache
        if: steps.cache-restore-prod.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          enableCrossOsArchive: true
          path: '**/module'
          key: ${{ matrix.bun-version }}-${{ hashFiles('package/main/module/tsconfig.tsbuildinfo') }}

  test:
    name: Run Tests
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        bun-version: [latest]
        os: [ubuntu-latest]
    defaults:
      run:
        working-directory: ./package/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ matrix.bun-version }}
      - name: Restore Dependencies Cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: '**/node_modules'
          key: dev-depends-${{ matrix.os }}-bun${{ matrix.bun-version }}-${{ hashFiles('package/main/package.json') }}
      - name: Run Tests with Coverage
        run: |
          set -o pipefail
          JEST_JUNIT_CLASSNAME="{filepath}" bun run test --coverage --reporters=default --reporters=jest-junit 2>&1 | tee /tmp/coverage-output.txt
      - name: Strip ANSI codes from coverage output
        if: always()
        run: sed 's/\x1B\[[0-9;]*[mGKHF]//g' /tmp/coverage-output.txt > /tmp/coverage-clean.txt || true
      - name: Check Coverage Thresholds
        id: check_coverage
        if: always()
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          PASSED=$(jq '.total.statements.pct == 100 and .total.branches.pct == 100 and .total.functions.pct == 100 and .total.lines.pct == 100' coverage/coverage-summary.json)
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "stmts=$(jq '.total.statements.pct' coverage/coverage-summary.json)" >> $GITHUB_OUTPUT
          echo "branch=$(jq '.total.branches.pct' coverage/coverage-summary.json)" >> $GITHUB_OUTPUT
          echo "funcs=$(jq '.total.functions.pct' coverage/coverage-summary.json)" >> $GITHUB_OUTPUT
          echo "lines=$(jq '.total.lines.pct' coverage/coverage-summary.json)" >> $GITHUB_OUTPUT
      - name: Post Coverage Comment on PR
        if: always() && github.event_name == 'pull_request' && steps.check_coverage.outputs.passed == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const summaryPath = path.join(process.env.GITHUB_WORKSPACE, 'package/main/coverage/coverage-summary.json');
            const outputPath = '/tmp/coverage-clean.txt';
            let summaryData;
            try {
              summaryData = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
            } catch (e) {
              console.log('Could not read coverage summary:', e.message);
              return;
            }
            const coverageText = fs.existsSync(outputPath) ? fs.readFileSync(outputPath, 'utf8') : '';
            // Extract coverage table (lines between dash separators)
            const tableMatch = coverageText.match(/([-]+[|][-| ]+\n(?:.*\n)*?[-]+[|][-| ]+)/);
            const coverageTable = tableMatch ? tableMatch[0] : '';
            const { statements: stmts, branches, functions: funcs, lines: lns } = summaryData.total;
            const parts = [
              '## ❌ カバレッジが100%ではありません',
              '',
              '| Metric | Coverage | Required |',
              '|--------|----------|----------|',
              `| % Stmts | ${stmts.pct}% | 100% |`,
              `| % Branch | ${branches.pct}% | 100% |`,
              `| % Funcs | ${funcs.pct}% | 100% |`,
              `| % Lines | ${lns.pct}% | 100% |`,
            ];
            // List files with < 100% coverage
            const uncoveredFiles = Object.entries(summaryData)
              .filter(([file, data]) => file !== 'total' && (
                data.statements.pct < 100 || data.branches.pct < 100 ||
                data.functions.pct < 100 || data.lines.pct < 100
              ))
              .map(([file, data]) => {
                const shortFile = file.replace(/.*\/src\//, 'src/');
                const issues = [];
                if (data.statements.pct < 100) issues.push(`Stmts: ${data.statements.pct}%`);
                if (data.branches.pct < 100) issues.push(`Branch: ${data.branches.pct}%`);
                if (data.functions.pct < 100) issues.push(`Funcs: ${data.functions.pct}%`);
                if (data.lines.pct < 100) issues.push(`Lines: ${data.lines.pct}%`);
                return `- \`${shortFile}\`: ${issues.join(', ')}`;
              });
            if (uncoveredFiles.length > 0) {
              parts.push('', '### カバレッジが100%未満のファイル', '', ...uncoveredFiles);
            }
            if (coverageTable) {
              parts.push(
                '',
                '<details>',
                '<summary>カバレッジ詳細（未カバーの行を含む）</summary>',
                '',
                '```',
                coverageTable,
                '```',
                '</details>'
              );
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: parts.join('\n')
            });
      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: riya-amemiya/UMT
      - name: Upload Test Results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
      - name: Fail if Coverage Not 100%
        if: always() && steps.check_coverage.outputs.passed == 'false'
        run: |
          echo "::error::カバレッジが100%ではありません！"
          echo "Statements: ${{ steps.check_coverage.outputs.stmts }}%"
          echo "Branches:   ${{ steps.check_coverage.outputs.branch }}%"
          echo "Functions:  ${{ steps.check_coverage.outputs.funcs }}%"
          echo "Lines:      ${{ steps.check_coverage.outputs.lines }}%"
          exit 1