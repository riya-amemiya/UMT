name: Publish Wiki
on:
  push:
    branches:
      - main
    paths:
      - 'package/main/**'
      - '.github/workflows/publish-wiki.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  publish:
    name: Publish TypeDoc to Wiki
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./package/main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Nix
        uses: DeterminateSystems/determinate-nix-action@92ffb5400c3776307a27a1727d7e2ac3dcd9f844 # v3.18.1
      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - name: Restore Dependencies Cache
        id: cache-restore-dev-depends
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: '**/node_modules'
          key: dev-depends-ubuntu-latest-bun-${{ hashFiles('package/main/package.json') }}
      - name: Install Dependencies
        if: steps.cache-restore-dev-depends.outputs.cache-hit != 'true'
        run: nix develop -c bun i
      - name: Save Dependencies Cache
        if: steps.cache-restore-dev-depends.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: '**/node_modules'
          key: dev-depends-ubuntu-latest-bun-${{ hashFiles('package/main/package.json') }}
      - name: Generate TypeDoc
        run: nix develop -c bunx typedoc
      - name: Clone wiki repo
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git" wiki-remote
      - name: Sync content
        working-directory: ${{ github.workspace }}
        run: rsync -av --delete --exclude='.git' package/main/doc/ wiki-remote/
      - name: Commit and push
        working-directory: ${{ github.workspace }}/wiki-remote
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "docs(wiki): sync from ${GITHUB_SHA:0:7}"
          git push origin HEAD
